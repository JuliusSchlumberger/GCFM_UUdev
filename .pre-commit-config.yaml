exclude: |
  (?x)(
    delta_model/|
    input/|
    output/|
    .*/src/input_processing/data/|
    .*/src/modelling_framework/static_data/|
    workflow/scripts/
  )
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-format # formatter
        types_or: [python, pyi, jupyter, toml]
      - id: ruff-check # linter
        types_or: [python, pyi, jupyter, toml]
        args: [--fix, --exit-non-zero-on-fix]
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: |
          (?x)(
            workflow/archive/|
            analyze_dem_coverage\.py|
            _diag_river.*\.py|
            plot_dag\.py|
            download_glofas\.py|
            check_diluvium\.py|
            sync_deltadtm\.py
          )
  - repo: local
    hooks:
      - id: sync-environment-yml
        name: sync environment.yml with hmt_sfincs_dev
        description: >-
          Regenerates environment.yml from the live hmt_sfincs_dev conda env
          and strips the machine-specific prefix line. Only runs when
          environment.yml is part of the commit.
        entry: python tools/sync_environment.py
        language: system
        files: ^environment\.yml$
        pass_filenames: false
