data_catalogue: ./config/data_catalogue.yml

profiling:
  enabled: false   # set to true to write line-level timing reports next to each log file

results_dir: D:/GCFM_UU/results

# ── Domain & basin setup (rules 01-02) ───────────────────────────────────────
# Domain = the delta polygon itself; target CRS is always auto-detected UTM.
domain:
  delta_buffer_m: 2000   # clipping bbox buffer around the delta polygon (m)

# ── Shared vertical datum correction ─────────────────────────────────────────
datum_correction: # EGM2008 -> GOCO06s (DEM) or local MSL -> GOCO06s (bathymetry), surge
  mdt_load_margin_deg: 5.0       # margin (degrees) beyond domain bbox when loading MDT
  fallback_search_deg: 3.0       # +/- deg to search for a valid MDT cell if the nearest station

# ── Existing flood-protection levels (rule 04) ───────────────────────────────
protection_levels:  # modification of forcing timeseries to account for existing flood-protection infrastructure
  enabled: true
  default_rp_yr: 2.0    # fallback assumed protection RP when neither Riverine nor Coastal are given
  max_rp_yr: 1000.0     # cap on the (FLOPROS) protection RP before discharge/

# ── River network processing (rules 06, 08, 09a, 09b, 10, 11) ──────────────
river_processing:
  flow_accumulation:
    discharge_variable: bankfull_discharge
    iterations: 100
  hydraulic_geometry: # Hydraulic depth using Power-law relations (Leopold-Maddock)
    discharge_threshold: 1.0e-4
    min_width_m: 1.0
    a: 0.27   # at-a-station width coefficient (Leopold & Maddock)
    b: 0.30   # at-a-station width exponent
    c: 7.20   # at-a-station depth coefficient
    f: 0.50   # at-a-station depth exponent
  estuarine_depth: # applying Leuven et al. (2018) for estuarine reaches
    enabled: true
    max_match_dist_km: 300.0  # max distance from basin bbox to Nienhuis delta lat/lon
    obrien_C: 6.5e-4          # O'Brien (1969) coefficient: A0 = C * P^alpha [m^3]
    obrien_alpha: 0.85        # O'Brien exponent (0.85 for natural, mixed-energy estuaries)
    convergence_ratio_k: 2.5  # L_A = L_e / k (convergence length as fraction of estuary length)
    blend_fraction: 0.15      # linear blend over +-15% of L_e around the estuarine/fluvial boundary
    min_depth_m: 0.5          # floor on estuarine reach depth
  conditioning: # Forced monotonicity downstream along river network.
    enabled: true
  burn_rivers:  # create separate DEM from zbed_anchors. Else zbed_anchors provided to hydromt_sfincs.
    enabled: true

# ── Boundary forcings (rule 07) ─────────────────────────────────────────────
boundary_forcings:
  lead_days: 12
  dt_hr: 1
  surge:
    min_stations: 6
    max_stations: 10
    dedupe_radius_km: 1
    return_period: 25
    search_radii_km: [10, 25, 50, 1000]
    period_hr: 12
    slr: # IPCC AR6 sea-level-rise fingerprint, scaled to a single global-mean target (slr_m) and added to each station's storm-tide level.
      enabled: true
      slr_m: 0.0                 # target global-mean SLR (m); 0 = no SLR added
      ssp_scenario: ssp245
      confidence_level: medium   # "medium" or "low"
      year: 2100
      quantile: 0.5
      fallback_search_deg: 3.0   # +/- deg to search for a valid AR6 location if the nearest is NaN
  river:
    period_hr: 24 # Choice of discharge variable from GLOFAS used.
    glofas_buffer_deg: 1.0
    glofas_search_radius_km: 5.0    # radius around inside-domain reach centroid to search for GloFAS cells
    glofas_min_mean_discharge: 10.0  # minimum mean discharge (m³/s) for a GloFAS cell to be considered

    eva:  # Extreme value analysis on GloFAS discharge -- river-only
      rp_bf: 1.5            # return period for bankfull discharge (yr, AMAX/GEV fit)
      ci_alpha: 0.95
      threshold_start_pct: 90.0
      threshold_step_pct: 1.0
      threshold_min_pct: 50.0   # floor: never drop below this percentile
      threshold_max_pct: 99.5
      threshold_max_iter: 30    # enough to traverse 50→99.5 % at 1 % steps
      peaks_per_year_min: 1.0
      peaks_per_year_max: 5
      min_years_high_confidence: 40
      min_days: 9131       # minimum valid days to attempt EVA (≈25 yr)
      decorr_cut: 0.368    # autocorrelation cutoff (≈1/e) for decorrelation window
      decorr_max: 30       # maximum decorrelation lag to search (days)
      fit_method: Lmoments

    bias_correction: # GRDC bias correction of GloFAS
      enabled: false            # set to false to disable GRDC bias correction globally
      # Also used whenever GRDC is consulted at all, not just when the
      # correction itself is applied: the raw GloFAS-vs-GRDC correlation
      # diagnostic (compute_grdc_correlation) runs unconditionally,
      # independent of `enabled` -- see src.extreme_values module docstring.
      grdc_search_radius_km: 15.0  # radius around inside-domain reach centroid to search
                                    # for a nearby GRDC gauge station (gauges are sparse,
                                    # hence a larger radius than glofas_search_radius_km)
      min_overlap_days: 730    # minimum overlapping valid days (GloFAS & GRDC) required
                                # to attempt empirical quantile mapping (~2 yr); else skipped
      tail_percentile: 90.0    # the headline GloFAS-vs-GRDC correlation is restricted to overlap days where
                                # GRDC discharge is at or above this percentile.

# ── Testing / validation (rule 12) ───────────────────────────────────────────
testing: # Diagnostic-only side branch
  upstream_boundary_check:
    effective_period_fraction: 0.5   # fraction of surge period_hr used as effective tidal period
    channel_manning_n: 0.030            # assumed channel roughness
    amplitude_threshold_fraction: 0.05   # march upstream until amplitude decays
                                          # below this fraction of its LOCAL
                                          # (per-mouth) starting value

# ── Boundary setup (rule 13) ─────────────────────────────────────────────────
boundary_setup:
  waterlevel_buffer_m: 25000   # search radius for matching surge boundary stations to the
                                # nearest waterlevel boundary cell (m)
  outflow_buffer_m: 500.0      # buffer radius (m) around each delta-outline outflow point
  design_rp_river_yr: 150      # return period (yr) of the river discharge the event is built at --
                                # looked up (log-RP interpolated) from river_forcing.nc's
                                # discharge_rp_table (GPD fit) at build time, see
                                # build_design_discharge_matrix in src/river_forcing.py. Replaces
                                # the old boundary_forcings.river.eva.rp_fl -- changing this value
                                # no longer requires re-running EVA (rule 07), only rebuilding (rule 13).
  mode: "compound"             # "compound" (real surge + real river discharge)
                               # "coastal_only" (real surge, river discharge set to 0).
                               # "river_only" (coastal boundary flat constant + real river discharge)
  flat_boundary_point_spacing_m: 5000   # boundary-point spacing along the waterlevel mask, used only when mode="river_only"
  compound:
    lag_hr: 0 # Shifts the river discharge timeseries relative to the surge timeseries

# ── SFINCS model build & run (rules 13, 14, 15) ─────────────────────────────
sfincs:
  grid:
    resolution: 120             # computational grid resolution in meters
    quadtree:
      enabled: false                  # set true to enable quadtree refinement near rivers/coast (requires subgrid.enabled: true)
      river_refinement_level: 1       # refinement levels (each level halves cell size) applied along river_network_processed.gpkg
      river_buffer_factor: 1.5        # river refinement buffer = width * this factor
      coastal_refinement_enabled: false  # set true to refine around the coastline; the coastal buffer
                                          # covers the entire coastline perimeter
      coastal_refinement_level: 2     # refinement level applied around the coastline
      coastal_buffer_m: 400          # coastal refinement buffer distance (m) around land_polygons.gpkg
  subgrid:
    enabled: True                # set to false to skip subgrid
    nr_subgrid_pixels: 4        # subgrid pixels per grid cell (must be multiple of 2)
    nr_levels: 20                 # water-level bins for subgrid tables; memory scales linearly with this (default: 20)
    nrmax: 2000                  # tile size for subgrid computation (default 2000)
  observation_points:
    n_top_crossings: 2           # number of highest-Q boundary crossings to trace downstream
    n_per_crossing: 5            # observation points placed per crossing
    max_downstream_hops: 200     # river-network traversal limit per crossing

  simulation: # Main EVENT model config
    tref: "2000-01-01 00:00:00"  # reference datetime; forcing timeseries are in "hours since tref"
    dtmapout:     3600           # spatial map output interval (s) -- MAIN EVENT run only
    dtmaxout:     3600           # max-value envelope output interval (s)
    dthisout:      600           # time-series output at observation points (s) -- MAIN EVENT run only
    storevelmax:     0           # write maximum flow velocity (0=off, 1=on)
    storetwet:       0           # write inundation duration / time-wet (0=off, 1=on)
    sfincs_exe: C:/Users/Schlu005\GCFM_UU\delta_model\software\SFINCS_v2.3.0_mt_Faber_release_exe\sfincs.exe
    timeout_s: 68400             # max wall-clock time for a SFINCS subprocess (s, 19 h) --
                                  # shared by both the spin-up and main event runs

  spinup: # Spin-up simulation with constant forcings
    enabled: true                # run a spin-up + create a restart file before the main event run
    spinup_days: 11               # days of constant bankfull forcing to reach steady river state
    dthisout_s: 3600              # obs-point output interval during spinup (s) — for validation plot
    dtmapout_s: 3600              # map snapshot interval during spinup (s) — controls animation frame count
  sanity_checks:
    min_inundation_depth_m: 0.0  # threshold for counting a cell as flooded in sanity checks
    animation_fps: 2             # frames per second for flood progression animation
