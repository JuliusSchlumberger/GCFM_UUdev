meta:
  version: '1'
  name: data_catalog_v1
  root: D:/GCFM_UU/raw_data

datasets:
  - name: delta_polygons
    description: Dataset of manually drawn polygons representing the delta areas globally based on earth-observation data. The polygons are drawn using five defined points as a first approximation of the geomorphologically active deltaic zone.
    source: Edmonds, D.A., Caldwell, R.L., Brondizio, E.S. et al. Coastal flooding will disproportionately impact people on river deltas. Nat Commun 11, 4741 (2020). https://doi.org/10.1038/s41467-020-18531-4
    file_format: gpkg
    file_path: DeltaWebs/modified/8_polygons.gpkg  # options: TestDelta_small.gpkg, TestPolygon.gpkg (Mississippi), 8_polygons.json (Mississippi, Zambezi, Ebro, Calvert, Mangoky, Vijose, Taiwan, Rhine-Meuse)
    crs:
      epsg: 4326
      name: WGS 84
      units: degrees
    attributes:
      - name: BasinID2
        type: integer
        description: >
          Unique identifier of the delta basin, used as the primary key to join
          with other datasets in the Edmonds et al. (2020) study.
        example: 200412
    primary_key: BasinID2
    spatial_extent: global

  - name: river_basins
    description: Dataset of river basins globally, used to identify the upstream drainage area for each delta basin.
    source: "HydroBASINS (https://www.hydrosheds.org/page/hydrobasins). Lehner, B., Grill G. (2013). Global river hydrography and network routing: baseline data and new approaches to study the world’s large river systems. Hydrological Processes, 27(15). 2171-2186. https://doi.org/10.1002/hyp.9740"
    file_format: shapefile
    file_path: HydroBASINS/hybas_global_merged_lev06.shp
    geometry_type: Polygon
    crs:
      epsg: 4326
      name: WGS 84
      units: degrees
    attributes:
      - name: HYBAS_ID
        type: integer
        description: >
          Unique identifier of the river basin, used as the primary key to join
          with other datasets in the HydroBASINS dataset.
        example: 1234567890
    primary_key: HYBAS_ID
    spatial_extent: global

  - name: fathomdem
    description: >
      Global terrain elevation model covering 60°S–80°N at ~30 m (1 arcsecond)
      resolution, produced by removing surface artifacts (buildings,
      vegetation canopy) from the Copernicus DEM (GLO-30) using a hybrid
      vision-transformer machine-learning model trained on >2,400 LiDAR
      reference datasets. No elevation clipping is applied (unlike
      DiluviumDEM's 80 m clip). The dataset is provided as 1°x1° tiles in
      WGS84 geographic coordinates (EPSG:4326), 19,210 tiles globally.
      IMPORTANT: pixel values are stored as int32 CENTIMETERS, not meters
      (raster tags: VERTICAL_UNITS=centimeters; confirmed by inspecting
      n00e010.tif) — divide by 100 to get meters.
    source: "Uhe, P., Lucas, C., Hawker, L., Brine, M., Wilkinson, H., Cooper, A., Saoulis, A.A., Savage, J., & Sampson, C. (2025). FathomDEM: an improved global terrain map using a hybrid vision transformer model. Environmental Research Letters, 20, 034002. https://doi.org/10.1088/1748-9326/ada972 . Data: Zenodo record 14523356 (https://doi.org/10.5281/zenodo.14523356), restricted access via share-link token — see tests/download_fathomdem.py."
    provider: gdal
    file_format: GeoTIFF
    file_path: FathomDEM/
    file_naming_convention: "{ns}{lat:02d}{ew}{lon:03d}.tif"
    file_naming_notes: >
      Lowercase. {ns} is n or s, {ew} is e or w. {lat} (2-digit) and {lon}
      (3-digit) are the tile's SW-corner integer degrees (e.g. n00e010.tif
      spans 0°-1°N, 10°-11°E; s01w090.tif spans 1°-0°S, 90°-89°W). Matches
      src.raster.find_fathomdem_tiles's fname construction (NTFS path
      lookups are case-insensitive, so the function's uppercase N/E also
      resolves these files on Windows) — but that function's docstring
      describes a different, stale "FathomDEM_N00_00_E110_00.tif" pattern;
      worth fixing for clarity even though the code itself is correct.
    tile_examples:
      - n00e010.tif
      - s01w090.tif
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
      datum: World Geodetic System 1984 ensemble (EPSG:4326)
    vertical_crs:
      epsg: 3855
      name: EGM2008 height
      type: Vertical
      units: "meters (raw pixel storage: centimeters, int32 — see description)"
      datum: EGM2008 geoid
      reference_surface: geoid
      positive_direction: up
    raster_properties:
      data_type: Int32
      nodata_value: -32768
      band_count: 1
      pixel_size_arcsec: 1
      tile_extent_deg: 1.0  # 1° x 1° tiles
      tags:
        INSTITUTE: Fathom
        LAYERID: TERRAIN-1ARCSEC-NW_OFFSET-FATHOMDEM-ELEVATION-v2.0
        VERTICAL_DATUM: EGM2008
        VERTICAL_UNITS: centimeters
    value_range:
      units: meters (after /100 conversion from raw centimeters)
      convention: no clipping applied
      example_tile_stats:  # n00e010.tif, raw values / 100
        min: -1.62
        max: 996.90
        mean: 362.68
    coverage:
      latitude_range: [-60, 80]
      longitude_range: [-180, 180]
      tile_count: 19210
    notes: >
      Model accuracy reported as substantially improved vs. FABDEM (lower
      MAE/RMSE), validated against >2,400 LiDAR reference datasets. The
      only supported coastal topography source (workflow/scripts/
      05a_get_elevation.py, workflow/src/raster.py find_fathomdem_tiles) —
      see the description's centimeters-unit caveat.


  - name: river_network
    # SWORD (SWOT River Database) v17c, "unpublished" custom export, reach-
    # level layer -- MANUALLY CORRECTED variant: for a set of specific
    # tributaries, main_side and width/max_width were adjusted based on
    # Google Earth imagery and expert knowledge, to improve discharge-
    # partitioning behaviour at bifurcations SWORD's own attributes get
    # wrong. This modified file is now the pipeline's DEFAULT river network
    # source (rule get_river_network reads this entry directly). The
    # unmodified original is kept as the separate `river_network_original`
    # entry (used for comparison in tests/test_bifurcation_calibration_
    # options.py). Geometry and rch_id_up/rch_id_dn topology are UNCHANGED
    # from the original -- only attribute values differ for the adjusted
    # reaches (confirmed: identical feature count/schema between the two).
    #
    # NOTE: earlier in this project's history the catalogue briefly pointed
    # at the official SWORD v17b global release instead (SWORD/
    # sword_v17b_global.gpkg) -- that was a mismatch (this project has
    # always actually used v17c) and has been rolled back. v17c carries a
    # richer field set than the official v17b release, including
    # main_path_id, is_mainstem_edge, path_seg_pos, rch_id_up_main/
    # rch_id_dn_main, hydro_dist_out, hydro_dist_hw, subnetwork_id,
    # continent, etc. -- all restored below. rch_id_up/rch_id_dn are a
    # Python-list-repr string (e.g. "[id1, id2]"), NOT the whitespace-
    # separated convention v17b uses.
    description: SWORD (SWOT River Database) v17c "unpublished" export, global reach-level vector river network, manually corrected for specific bifurcating tributaries.
    source: "Derived from SWORD (SWOT River Database) v17c (unpublished export; see raw_data/SWORD/v17c_release_notes.pdf and v17c_variable_reference.pdf) with manual attribute corrections based on Google Earth imagery and expert knowledge."
    provider: ogr
    file_format: GeoPackage
    file_path: SWORD/SWORD_global_v17c_unpublished_modified.gpkg
    layer_name: global_edges
    storage: GPKG
    encoding: UTF-8
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
      datum: World Geodetic System 1984 ensemble (EPSG:6326)
      accuracy_m: 2
    geometry:
      type: LineString
      geometry_column: geom
    feature_count: 248672
    coverage:
      latitude_range: [-52.0002, 82.3108]
      longitude_range: [-179.9999, 179.9999]
    primary_key: fid
    fields_of_interest:
      x:
        type: Real
        description: Longitude of the node or reach ranging from 180°E to 180°W (decimal degrees).
      y:
        type: Real
        description: Latitude of the node or reach ranging from 90°S to 90°N (decimal degrees).
      reach_id:
        type: Integer64
        description:  unique identifier for each river reach
      width:
        type: Real
        description:  reach-averaged width in meters
      max_width:
        type: Real
        description:   Maximum width value across the channel for each node or reach that includes island and bar areas (in meters).
      lakeflag:
        type: Integer
        description: "GRWL water body identifier for each reach: 0 – river, 1 – lake/reservoir, 2 – canal, 3 – tidally influenced river."
      rch_id_up:
        type: String
        length: 80
        description: IDs of upstream reaches (presented as list "[rch_id_up1, rch_id_up2,...]").
      rch_id_dn:
        type: String
        length: 80
        description: IDs of downstream reaches (presented as list "[rch_id_dn1, rch_id_dn2,...]").
      slope:
        type: Real
        description:  # add once known — likely reach slope, units to confirm (m/m or m/km)
      main_side:
        type: Integer
        description: "SWORD's own primary-vs-secondary channel classification: 0 = reach is part of the main channel/mainstem; 1 or 2 = reach is a secondary/side channel."
      main_path_id:
        type: Integer64
        description: ID of the main path of the river arm to which the reach belongs (multiple reaches can share the same main_path_id if they belong to the same river arm). Used as the same-river-arm grouping key at bifurcations (src.river_network.trace_seed_mainstem_paths, compute_river_elevation_profile), together with is_mainstem_edge.
      is_mainstem_edge:
        type: Integer
        description: Flags whether a reach is part of the SWORD-identified mainstem (vs. a distributary/side-channel edge). Tie-breaker at bifurcations when more than one downstream candidate shares main_path_id.
      path_seg_pos:
        type: Integer64
        description: position within main path of river arm (0 = most upstream, increasing downstream)

  - name: river_network_original
    # Unmodified SWORD v17c "unpublished" export -- same schema/feature
    # count as `river_network`, but WITHOUT the manual main_side/width
    # corrections. Used for the "before" comparison scenario in
    # tests/test_bifurcation_calibration_options.py; not read by any
    # production rule (rule get_river_network reads `river_network`, the
    # modified/default version).
    description: SWORD (SWOT River Database) v17c "unpublished" export, global reach-level vector river network, unmodified.
    source: "SWORD (SWOT River Database) v17c (unpublished export; see raw_data/SWORD/v17c_release_notes.pdf and v17c_variable_reference.pdf)."
    provider: ogr
    file_format: GeoPackage
    file_path: SWORD/SWORD_global_v17c_unpublished.gpkg
    layer_name: global_edges
    storage: GPKG
    encoding: UTF-8
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
      datum: World Geodetic System 1984 ensemble (EPSG:6326)
      accuracy_m: 2
    geometry:
      type: LineString
      geometry_column: geom
    feature_count: 248672
    coverage:
      latitude_range: [-52.0002, 82.3108]
      longitude_range: [-179.9999, 179.9999]
    primary_key: fid
    fields_of_interest:
      # Same schema as `river_network` -- see that entry for full field
      # documentation. main_side and width/max_width are the fields that
      # differ (uncorrected) relative to `river_network`.

  - name: coastal_bathymetry
    description: Global terrain model for ocean and land providing elevation in meters on a 15 arc-second interval grid. Bathymetry over oceans plus land topography in one continuous grid.
    source: "GEBCO Compilation Group (2026) GEBCO 2026 Grid. Available at https://www.gebco.net/data-products/gridded-bathymetry-data. Published 23 April 2026 by the Nippon Foundation-GEBCO Seabed 2030 Project. Base grid: SRTM15+ V2.8 (Tozer et al. 2019) augmented with regional multibeam compilations from the four Seabed 2030 Regional Centers."
    provider: gdal  # adjust if you're loading the NetCDF directly rather than via a GeoTIFF
    file_format: GeoTIFF
    file_path:  gebco_2026_geotiff/
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
      datum: World Geodetic System 1984 ensemble (EPSG:6326)
      accuracy_m: 2
    raster_properties:
      data_type:  # add once known — typically Int16 for elevation in meters, but confirm from the file
      nodata_value:  # add once known
      band_count: 1
      pixel_size_arcsec: 15
      pixel_size_deg: 0.004166666666666667  # 15/3600 — ≈ 460 m at the equator
    value_range:
      units: meters
      convention: positive above sea level, negative below
    coverage:
      latitude_range: [-90, 90]
      longitude_range: [-180, 180]
    versions_available:
      - standard: elevation includes ice-surface in Greenland and Antarctica
      - under_ice: bedrock topography beneath the Greenland and Antarctica ice sheets
    notes: >
      GEBCO has limited accuracy and resolution, but it is the only available data source in many places in the world, so it is sometimes used as the best-estimate in very data-poor sites. However, the accuracy of GEBCO varies depending on the input data sources (Monteys et al. 2015). Problem is, that satellite altimetry breaks down nearshore given the resolution and fine-scale details and temporal changes especially in sandy, nearshore, (inter)tidal areas (Almar et al. 2021). As a result of being merged of many different datasets, GEBCO does not provide any information regarding vertical accuracy or vertical reference datum. GEBCO's global elevation models are generated by the assimilation of heterogeneous data types, assuming all of them to be referred to Mean Sea Level.

  - name: land_use
    description: Global dynamic land cover map at 100 m spatial resolution, discrete classification layer. Reference year 2019, based on PROBA-V observations from 2017-04 to 2020-03. Part of the Copernicus Global Land Service LC100 product portfolio.
    source: "Buchhorn, M., Smets, B., Bertels, L., De Roo, B., Lesiv, M., Tsendbazar, N.-E., Herold, M., Fritz, S. (2020). Copernicus Global Land Service: Land Cover 100m: collection 3: epoch 2019: Globe. https://doi.org/10.5281/zenodo.3939050. Methodology: Buchhorn et al. (2020), Remote Sensing 12(6), 1044. https://doi.org/10.3390/rs12061044. Product page: https://land.copernicus.eu/global/products/lc"
    provider: gdal
    file_format: GeoTIFF
    file_path: Copernicus/Copernicus_LandUse.tif
    compression: DEFLATE
    producer:
      institution: VITO NV
      creator: Dr. Marcel Buchhorn (VITO)
      copyright: Copernicus Service information 2020
      product_version: v3.0.1
      processing_line: LC100 v4.1
      file_created: 2020-07-13
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
      datum: World Geodetic System 1984 ensemble (EPSG:6326)
      accuracy_m: 2
    raster_properties:
      data_type: Byte (UInt8)
      nodata_value: 255
      band_count: 1
      pixel_size_deg: 0.0009920634920634888  # 1/1008° ≈ 100 m at the equator
      dimensions:
        width_px: 362880
        height_px: 141120
      origin: [-180.0, 80.0]  # upper-left corner (lon, lat)
      valid_range: [0, 254]
      area_or_point: Area
      scale: 1
      offset: 0
    coverage:
      latitude_range: [-60, 80]
      longitude_range: [-180, 180]
    temporal_coverage:
      reference_year: 2019
      observation_period_start: 2017-04-01
      observation_period_end: 2020-03-31
      note: Single epoch (2019-nrt). For multi-year analyses, additional epochs (2015-2018) must be downloaded separately.
    classification:
      scheme: Discrete Classification map
      band_name: Discrete-Classification-map
      class_count: 23
      classes:
        0: unknown
        20: shrubland
        30: herbaceous_vegetation
        40: cropland
        50: built-up
        60: bare_sparse_vegetation
        70: snow_ice
        80: permanent_inland_water
        90: herbaceous_wetland
        100: moss_lichen
        111: ENF_closed   # Evergreen Needleleaf Forest
        112: EBF_closed   # Evergreen Broadleaf Forest
        113: DNF_closed   # Deciduous Needleleaf Forest
        114: DBF_closed   # Deciduous Broadleaf Forest
        115: mixed_closed
        116: unknown_closed
        121: ENF_open
        122: EBF_open
        123: DNF_open
        124: DBF_open
        125: mixed_open
        126: unknown_open
        200: sea
        255: missing_value (NoData)
    satellite:
      platform: Proba-V
      sensor: VEGETATION
      orbit_type: LEO
      processing_level: L3
      processing_mode: Offline
      input_grid: MGRS (Sentinel-2 tiling grid), UTM during production
    notes: >
      "The 'closed' forest classes denote >70% canopy cover; 'open' denotes 15–70% canopy cover
      (per the LC100 product user manual). The 111–116 / 121–126 numbering separates closed
      vs open forest variants for the same forest type."

  - name: lu_to_roughness_lookup
    description: "Lookup table to convert land use classes from the Copernicus Land Use dataset to Manning's n roughness coefficients for hydrodynamic modeling. Note: Copernicus land use has 23 classes, while ESA only distinguishes 11. We subsume various Copernicus forest classes into a single 'forest' class, to match the ESA land use classes. The Manning's n values are based on typical values for each land use type from the literature, but may need to be adjusted based on local conditions or specific modeling needs."
    source:  https://www.hec.usace.army.mil/confluence/rasdocs/r2dum/latest/developing-a-terrain-model-and-geospatial-layers/creating-land-cover-mannings-n-values-and-impervious-layers
    file_format: CSV
    file_path: Copernicus/lu_to_roughness_lookup.csv
    encoding: UTF-8
    fields:
      - name: copernicus_worldcover
        type: Integer
        description: Copernicus Land use class code corresponding to the classes in the Copernicus Land Use dataset (e.g. 0, 20, 30, ..., 126, 200).
      - name: lu_name
        type: string
        description: Name of the land use class.
      - name: manning_n
        type: Real
        description: Manning's n roughness coefficient associated with each land use class, used for hydrodynamic modeling of flow resistance.


  - name: storm_tide_return_periods # TODO: get real timeseries information for extracting real time series
    description: >
      Global dataset of coastal storm tide return periods (storm surge + tide) at output
      locations of the Global Tide and Surge Model (GTSM). Surges from extratropical
      cyclones are derived from a 38-year ERA5-forced simulation; surges from tropical
      cyclones are derived from 10,000 years of synthetic tracks from the STORM dataset
      under current climate conditions. The two are probabilistically combined with tidal
      levels and return periods are computed empirically.
    source: "Dullaart, J.C.M., Muis, S., Bloemendaal, N., Chertova, M.V., Couasnon, A., & Aerts, J.C.J.H. (2021). Accounting for tropical cyclones more than doubles the global population exposed to low-probability coastal flooding. Institute for Environmental Studies, Vrije Universiteit Amsterdam. Contact: job.dullaart@vu.nl"
    provider: xarray
    file_format: NetCDF
    file_path: CoastRP/COAST-RP.nc
    model_version: "Deltares D-Flow FM v1.2.63.64757"
    forcing_sources:
      extratropical: ERA5 climate reanalysis (ECMWF), 38-year time series
      tropical: STORM synthetic tropical cyclone tracks, 10,000 years (current climate)
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
    geometry_type: Point  # GTSM output stations along the global coastline
    coordinates:
      station_x_coordinate: longitude (degrees_east)
      station_y_coordinate: latitude (degrees_north)
    primary_key: station_id
    data_variables:
      station_id:
        type: string
        description: Name/identifier of the GTSM output location.
      storm_tide_rp_0001:
        type: Real
        units: meters
        description: Storm tide level for the 1-year return period.
      storm_tide_rp_0002:
        type: Real
        units: meters
        description: Storm tide level for the 2-year return period.
      storm_tide_rp_0005:
        type: Real
        units: meters
        description: Storm tide level for the 5-year return period.
      storm_tide_rp_0010:
        type: Real
        units: meters
        description: Storm tide level for the 10-year return period.
      storm_tide_rp_0025:
        type: Real
        units: meters
        description: Storm tide level for the 25-year return period.
      storm_tide_rp_0050:
        type: Real
        units: meters
        description: Storm tide level for the 50-year return period.
      storm_tide_rp_0100:
        type: Real
        units: meters
        description: Storm tide level for the 100-year return period.
      storm_tide_rp_0250:
        type: Real
        units: meters
        description: Storm tide level for the 250-year return period.
      storm_tide_rp_0500:
        type: Real
        units: meters
        description: Storm tide level for the 500-year return period.
      storm_tide_rp_1000:
        type: Real
        units: meters
        description: Storm tide level for the 1000-year return period.
    vertical_reference:
      units: m
      positive: up
      datum:  # TODO: stated as local MSL in the source notebooks (see src/surge.py); an optional
              # MDT-based local-MSL -> geoid correction is available via
              # boundary_forcings.surge.vertical_correction (default OFF — see the TODO in
              # src/surge.py for an open consistency question with the DEM's "local MSL" reference)
    coverage:
      latitude_range: [-90, 90]
      longitude_range: [-180, 180]
      spatial_extent: global (coastal output stations)
    notes: >
      Data are provided at discrete GTSM stations along the coast.

  - name: river_discharge
    description: >
      Gridded daily hydrological reanalysis from the Global Flood Awareness System
      (GloFAS), produced by forcing the LISFLOOD hydrological model with ERA5
      meteorological reanalysis data. Provides a consistent global representation of
      river discharge, runoff, snow water equivalent, and root-zone soil wetness. Part
      of the Copernicus Emergency Management Service (CEMS), managed by the European
      Commission's Joint Research Centre. Two product streams exist: consolidated
      (monthly updates, using consolidated ERA5) and intermediate (daily updates,
      using ERA5T near-real-time data). Data are stored in separate netCDF-4 files per year following the convention "glofas_{year}.nc"
    source: "Copernicus Emergency Management Service (CEMS), Global Flood Awareness System (GloFAS) v4.0, released 2023-07-26. Produced by ECMWF on behalf of the European Commission's Joint Research Centre. Available via the Copernicus Early Warning Data Store (EWDS): https://ewds.climate.copernicus.eu/"
    provider: xarray  # NetCDF-4 / GRIB2 — load with xarray.open_dataset (cfgrib engine for GRIB2)
    file_format: NetCDF-4  # also available as GRIB2
    file_path: GloFAS/  # add specific file/subfolder once finalised
    conventions: CF-1.7  # WMO GRIB2 conventions inherited by NetCDF-4
    producer:
      institution: European Centre for Medium-Range Weather Forecasts (ECMWF)
      centre_code: ecmf
      grib_edition: 2
      processing: "GRIB to CDM+CF via cfgrib-0.9.15.1 / ecCodes-2.42.0"
      model_version_date: 2022-10-01  # dateOfModelVersion 20221001
    model:
      name: LISFLOOD
      forcing: ERA5 meteorological reanalysis (interpolated to GloFAS resolution)
      timestep: 24 hours
      product_streams:
        consolidated: monthly updates, forced with consolidated ERA5
        intermediate: daily updates, forced with ERA5T near-real-time
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
    raster_properties:
      grid: Regular latitude-longitude
      pixel_size_deg: 0.05  # v4.0; legacy versions (≤ v3.1) are 0.1°
      band_count: 1  # per variable
    coverage:
      latitude_range: [-60, 90]   # global except Antarctica
      longitude_range: [-180, 180]
      spatial_extent: global excluding Antarctica
    temporal_coverage:
      start: 1979-01-01
      end: 2025-12-31
      resolution: daily
    version: GloFAS v4.0 (released 2023-07-26)
    main_variables:
      river_discharge_24h:
        units: m^3 s^-1
        vertical_level: surface
        temporal_aggregation: 24-hour mean
        description: >
          Volume rate of water flow (incl. sediments, chemical and biological material)
          in the river channel, averaged over 24 hours through a cross-section.
      runoff_water_equivalent:
        units: kg m^-2
        vertical_level: surface
        temporal_aggregation: 24-hour accumulation
        description: >
          Sum of surface and sub-surface runoff — total water that would drain away
          from the grid box, accumulated over 24 hours.
      snow_depth_water_equivalent:
        units: kg m^-2
        vertical_level: surface
        temporal_aggregation: instantaneous (end of timestep)
        description: >
          Mass of water per square meter if all snow in the grid box were melted.
      soil_wetness_index:
        units: dimensionless
        vertical_level: subsurface (root zone)
        temporal_aggregation: instantaneous (end of timestep)
        valid_range: [0, 1]   # 0 = residual soil moisture, 1 = saturation
        description: >
          Volume of water over total volume of voids in the soil column, expressed as
          an index between 0 (residual) and 1 (saturation), over the root zone depth.
    ancillary_variables:
      elevation:
        units: m
        description: Mean elevation above sea level per pixel in the GloFAS domain.
      upstream_area:
        units: m^2
        description: >
          Total upstream catchment area for each river pixel — the area contributing
          water to the river at that grid point (includes the pixel itself).
    notes: >
      "GloFAS provides a consistent global hydrological dataset, but it is a model
      reanalysis and thus subject to model biases and uncertainties. It is most
      reliable in data-rich regions where it can be calibrated against observations,
      and less reliable in data-poor regions (e.g. parts of Africa, South America)
      where the model relies more heavily on its internal physics and the quality of
      the ERA5 meteorological forcing. GloFAS v4.0 has improved resolution (0.05°) and
      updated model physics compared to previous versions, but users should still
      evaluate its performance against local observations where possible before using
      it for critical applications."

  - name: grdc_discharge
    description: >
      Daily river discharge observations from the Global Runoff Data Centre
      (GRDC), used as ground-truth gauge data to bias-correct GloFAS
      reanalysis discharge via empirical quantile mapping where a station
      exists near a delta's main river inflow (see
      boundary_forcings.river.bias_correction). Currently an extract of 83
      stations covering the 8 basins in the 8_polygons.json delta-polygon
      test set (Mississippi, Zambezi, Ebro, Calvert, Mangoky, Vijose,
      Taiwan, Rhine-Meuse) — not a global extract, so basins outside that
      test set will typically find no station within grdc_search_radius_km
      and fall back to GloFAS-as-truth (logged).
    source: "Global Runoff Data Centre (GRDC), Koblenz, Germany. https://www.bafg.de/GRDC/"
    provider: xarray
    file_format: NetCDF-4
    file_path: GRDC/GRDC-Daily.nc
    geometry_type: Point   # one point per station (geo_x/geo_y), not gridded
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
    dimensions:
      time: 53409   # 1880-01-01 .. 2026-03-24, daily
      id: 83         # station count (8-test-delta extract, see description)
    data_variables:
      runoff_mean:
        dims: [time, id]
        type: float32
        units: m^3 s^-1
        missing_value: -999.0
        description: Mean daily discharge (Q). -999.0 indicates missing data.
      geo_x:   {dims: [id], type: float32, units: degree_east,  description: Station longitude (WGS84).}
      geo_y:   {dims: [id], type: float32, units: degree_north, description: Station latitude (WGS84).}
      geo_z:   {dims: [id], type: float32, units: m, description: Station altitude.}
      area:    {dims: [id], type: float32, units: km^2, description: Catchment area at the station.}
      river_name:    {dims: [id], description: Name of the river at the station.}
      station_name:  {dims: [id], description: Name of the gauging station.}
      country:       {dims: [id], description: Country code of the station.}
    primary_key: id
    coverage:
      spatial_extent: The 8 basins in the 8_polygons.json delta-polygon test
        set (Mississippi, Zambezi, Ebro, Calvert, Mangoky, Vijose, Taiwan,
        Rhine-Meuse); not a global extract.
    temporal_coverage:
      start: 1880-01-01
      end: 2026-03-24
      resolution: daily
    notes: >
      Used by src/river_forcing.py (load_grdc_stations, find_nearest_grdc_station,
      load_grdc_series) and src/extreme_values.py (bias_correct_discharge,
      compute_grdc_correlation) in rule get_boundary_forcings (07). Search
      radius: boundary_forcings.river.bias_correction.grdc_search_radius_km. TODO:
      downloading a global GRDC extract (vs. the current 8-test-delta
      extract) would let the correlation diagnostic and bias correction run
      automatically for basins outside the current test set instead of
      falling back to GloFAS-as-truth.

  - name: osm_land
    description: >
      Global land polygons derived from OpenStreetMap (OSM) data, split into a grid
      with slight overlap between tiles. Provides a high-detail vector representation
      of the world's coastline and inland water boundaries, suitable for masking,
      clipping, or rendering land vs ocean.
    source: "OpenStreetMap contributors (2026). Land polygons extract from https://osmdata.openstreetmap.de/data/land-polygons.html (data snapshot: 2026-04-30). © OpenStreetMap contributors, available under the Open Database License (ODbL): https://www.openstreetmap.org/copyright"
    license: ODbL (Open Database License)
    provider: ogr
    file_format: geopackage
    file_path: OSM/land_polygons.gpkg
    layer: land_polygons
    geometry_type: Polygon
    feature_count: 864818
    crs:
      epsg: 4326
      name: WGS 84
      type: Geographic (2D)
      units: degrees
    coverage:
      latitude_range: [-90, 83.665]   # no data north of ~83.67°N
      longitude_range: [-180, 180]
      spatial_extent: global (excluding high Arctic above 83.665°N)
    temporal_coverage:
      data_snapshot: 2026-04-30
    notes: >
      Polygons are split into tiles with slight overlap, so spatial queries near tile
      boundaries may return duplicate or overlapping geometries — dissolve or de-duplicate
      if topologically clean output is required. Attribution to OpenStreetMap contributors
      is required when using or redistributing derivative products (ODbL).
      The GeoPackage carries TWO layers: 'land_polygons' (the actual polygon geometries,
      used here) and 'marine_buffer' (an x/y tile-grid index). gpd.read_file()/pyogrio
      silently default to the first layer ('marine_buffer') if layer= is not given,
      which yields empty results for small bbox queries — always read with
      layer="land_polygons".

  - name: goco06s
    description: >
      GOCO06s combined gravity field model (satellite-only, degree/order 300).
      Used to compute GOCO06s geoid undulation N_GOCO06s, which is the common
      vertical datum with MDT_CNES-CLS22 and COAST-RP water-level datasets.
      Download from ICGEM Table of Models: http://icgem.gfz-potsdam.de/home
    source: "Kvas et al. (2021), GOCO06s — A satellite-only gravity field model. Earth System Science Data 13(1), 99–118."
    file_format: gfc (ICGEM spherical harmonic coefficients)
    file_path: ICGM/GOCO06s.gfc
    attributes:
      - name: max_degree
        type: integer
        description: Maximum spherical harmonic degree (≈ 300)

  - name: egm2008_geoid
    description: >
      EGM2008 Earth Gravitational Model (degree/order 2190). Used here only to
      compute the N_EGM2008 geoid undulation — the DiluviumDEM is referenced to
      this geoid and must be corrected to GOCO06s before blending with GEBCO.
      Download from ICGEM Table of Models.
    source: "Pavlis et al. (2012), The development and evaluation of the EGM2008. J. Geophys. Res. 117, B04406."
    file_format: gfc (ICGEM spherical harmonic coefficients)
    file_path: ICGM/EGM2008.gfc

  - name: mdt_cnes_cls22
    description: >
      Mean Dynamic Topography CNES-CLS22 from AVISO (HYBRID-CNES-CLS2022).
      Gives the time-mean sea-surface height above the GOCO06s geoid [m].
      Subtracting MDT from a GOCO06s-referenced DEM converts it to orthometric
      heights above local Mean Sea Level (MSL): H_MSL = H_GOCO06s − MDT.
      Download from AVISO+ (https://www.aviso.altimetry.fr) — requires free account.
      Note: MDT is defined over ocean only; near-coastal values are used for
      the coastal DiluviumDEM correction (all deltas lie within the 500 km
      validity range from the coast).
    source: "CNES-CLS22 MDT, AVISO+ altimetry data centre. https://doi.org/10.24400/527896/a01-2021.001"
    file_format: NetCDF
    file_path: AVISO/mdt_hybrid_cnes_cls22_cmems2020_global.nc
    crs:
      epsg: 4326
    variables:
      mdt:
        units: m
        description: Mean dynamic topography above GOCO06s geoid
        sign_convention: positive upward (sea surface above geoid)

  - name: protection_levels_flopros
    description: >
      FLOPROS flood protection standards (design return period, years) joined
      to WRI Aqueduct's "geogunit_107" sub-national administrative units, one
      row per unit (row index = the unit's Geogunits raster value, see
      wri_geogunit_107 below). Separate Riverine and Coastal columns -- design
      standards for the two hazards are independent and frequently only one
      is populated (NaN = no known formal protection standard for that hazard
      in that unit). Used to estimate the discharge/water-level already
      handled by existing flood defenses, not represented in the DEM or any
      other input, for the optional top-level protection_levels
      correction (see src/protection_levels.py).
    source: >
      FLOPROS: Scussolini, P., Aerts, J.C.J.H., Jongman, B., Bouwer, L.M.,
      Winsemius, H.C., de Moel, H., Ward, P.J. (2016). FLOPROS: an evolving
      global database of flood protection standards. Natural Hazards and
      Earth System Sciences, 16, 1049-1061.
      https://doi.org/10.5194/nhess-16-1049-2016 . Spatial join to WRI
      Aqueduct geographical units: http://floods.wri.org/
    provider: openpyxl
    file_format: xlsx
    file_path: protection_levels/FLOPROS_NL_geogunit_107.xlsx
    primary_key: FID_Aque
    fields_of_interest:
      FID_Aque:
        type: Integer
        description: Geounit ID; matches the Geogunits raster value in wri_geogunit_107.
      ISO:
        type: string
        description: ISO3 country code of the unit.
      Riverine:
        type: Real
        units: years
        description: Design return period of riverine flood protection (NaN if unknown/no formal standard).
      Coastal:
        type: Real
        units: years
        description: Design return period of coastal flood protection (NaN if unknown/no formal standard).
    notes: >
      Used by src/protection_levels.py (load_flopros_table) in rule
      get_protection_levels. Only ~74% of units have a Riverine value and
      ~25% have a Coastal value globally -- missing values are the normal
      case and are handled by a fallback chain (own hazard -> other hazard
      -> protection_levels.default_rp_yr), not an error.

  - name: wri_geogunit_107
    description: >
      Global ~30 arcsec (~1 km) raster of WRI Aqueduct "geogunit_107"
      sub-national administrative unit IDs (Geogunits variable, float32,
      _FillValue=-9999), covering both land and sea (ocean pixels carry the
      nearest country's unit ID, not a separate no-data sentinel). Pixel
      value = row index into protection_levels_flopros above and
      wri_geogunit_107_list below.
    source: "WRI Aqueduct Global Flood Risk / GLOFRIS impact model. http://floods.wri.org/ . Institute for Environmental Studies VU Amsterdam."
    provider: xarray
    file_format: NetCDF
    file_path: WRI/geogunit_107_all.nc
    crs:
      epsg: 4326
      name: WGS 84
      units: degrees
    raster_properties:
      data_type: Float32
      nodata_value: -9999.0
      band_count: 1
      dimensions:
        width_px: 43200
        height_px: 21600
    coverage:
      latitude_range: [-90, 90]
      longitude_range: [-180, 180]
    notes: >
      Used by src/protection_levels.py (identify_dominant_protection) in
      rule get_protection_levels via a small windowed read clipped to each
      delta polygon's bbox -- the full global array (~900M pixels) is never
      loaded into memory.

  - name: wri_geogunit_107_list
    description: >
      Row index -> ISO3 country code lookup for wri_geogunit_107's Geogunits
      raster values (same row order as protection_levels_flopros). Used only
      for labelling the dominant unit in diagnostics/plots.
    source: "WRI Aqueduct Global Flood Risk / GLOFRIS impact model. http://floods.wri.org/"
    provider: openpyxl
    file_format: xlsx
    file_path: WRI/geogunit_107_all_list.xlsx
    notes: >
      Two unnamed columns: geounit index (matches Geogunits raster value /
      protection_levels_flopros row index) and ISO3 country code.

  - name: slr_ar6_regional
    description: >
      IPCC AR6 regional sea-level-change projections (combined
      confidence-level output: ~1030 gauge-style locations plus 65160 points
      on a 1°x1° grid). Used to derive a per-station SLR "fingerprint" —
      sea_level_change at the nearest location, normalised by the
      global-mean sea_level_change over valid 1° grid cells — for the
      configured SSP/confidence/year/quantile. Scaled by
      boundary_forcings.surge.slr.slr_m and added to each surge station's
      storm-tide return-period level (see src/surge.py).
    source: "IPCC AR6 Sea Level Projections (Garner et al. 2021), via Zenodo DOI 10.5281/zenodo.5914710"
    provider: xarray
    file_format: NetCDF-4
    file_path: SLR/ar6-regional-confidence/regional/confidence_output_files/
    crs:
      epsg: 4326
    dimensions:
      locations: 66190   # 1030 gauge-style locations + 65160 on a 1°x1° grid
      years: 14          # 2020..2150, step 10
      quantiles: 107     # includes 0.5
    data_variables:
      sea_level_change:
        dims: [quantiles, years, locations]
        units: mm
        description: Projected sea-level change relative to a 1995-2014 baseline.
      lat: {dims: [locations], units: degrees_north}
      lon: {dims: [locations], units: degrees_east}
    notes: >
      Path layout: {confidence}_confidence/{ssp}/total_{ssp}_{confidence}_confidence_values.nc
      e.g. medium_confidence/ssp245/total_ssp245_medium_confidence_values.nc.
      Used by src/surge.py (load_slr_fingerprint, compute_global_mean_slr,
      apply_slr_fingerprint) in rule get_boundary_forcings.

  - name: nienhuis_delta_characteristics
    description: >
      Tidal and morphological characteristics of 72 global river deltas:
      tidal prism, estuary length, tidal amplitude, tidal frequency, mean
      annual river discharge, mouth widths, and hindcast/predicted tidal
      discharge. Used by rule add_estuarine_depth to determine which basins
      overlap a known delta and to parameterise the Leuven et al. (2018)
      estuarine depth profile for reaches within L_e of the coast.
    source: >
      Nienhuis, J.H., Ashton, A.D., Roos, P.C., Hulscher, S.J.M.H., Giosan, L.
      (2018). Future Change to Tide-Influenced Deltas. Geophysical Research
      Letters, 45, 3499-3507. https://doi.org/10.1029/2018GL077638
    provider: openpyxl
    file_format: xlsx
    file_path: Nienhuis_prisms/delta_characteristics_72_deltas.xlsx
    primary_key: "#"
    fields_of_interest:
      "#":
        type: string
        description: Delta identifier (integer, sometimes with letter suffix e.g. '6a').
      Name:
        type: string
        description: Delta name (e.g. 'Amazon', 'Mississippi').
      Lat:
        type: Real
        units: degrees_north
        description: Representative latitude of the delta centre.
      Lon:
        type: Real
        units: degrees_east
        description: Representative longitude of the delta centre.
      Q_river (m3s-1):
        type: Real
        units: m3 s-1
        description: Mean annual river discharge at the delta apex.
      L (m):
        type: Real
        units: m
        description: >
          Estuary length L_e (m) -- distance from the mouth to the tidal
          limit. Reaches with dist_out <= L_e are treated as estuarine
          by the Leuven et al. (2018) depth model.
      a (m):
        type: Real
        units: m
        description: Tidal amplitude at the mouth (m).
      w (s-1):
        type: Real
        units: rad s-1
        description: Tidal angular frequency (omega, radians per second).
      P (m3):
        type: Real
        units: m3
        description: >
          Tidal prism (m3) -- volume of water exchanged per tidal cycle.
          Used in the O'Brien (1969) relation A0 = C * P^alpha to compute
          the cross-sectional area at the estuary mouth.
      w_mouth_obs (m):
        type: Real
        units: m
        description: Observed total mouth width summed across all distributaries (m).
    notes: >
      Used exclusively by src/estuarine_depth.py (load_nienhuis,
      match_basin_to_delta) in rule add_estuarine_depth. Matching is by
      spatial proximity: the Nienhuis delta Lat/Lon must fall within the
      basin's delta_polygon bbox or within a configurable buffer distance
      (river_processing.estuarine_depth.max_match_dist_km). If no match
      is found, the rule falls back silently to the existing power-law
      rivdph for all reaches.
