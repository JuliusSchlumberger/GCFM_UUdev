
CRS:
  for_distances: 3857
  standard: 4326

Testcase:
  id_delta1: 4267691

Delta_masks:
  scale_factor: 1.1 # factor to scale s1, rm and s2 if partially intersecting with coastline
  min_delta_area: 1  # Minimum delta area (km2) below which a delta is excluded from processing.
  bbox_delta: 500_000 # Buffer added around each delta bounding box when clipping supporting data.
  tolerance_deg: 0.01 # Buffer around polygons (especially coastline) for difference with basins
  snap_distance_rivers: 0.02
  offshore_buffer: 0.1  # distance in deg from shore used to clip gebco
  gebco_depth: -10  # maximum water depth taken from gebco. Gebco has extreme weakness in intertidal zone and shallow coast area.
  DTM_buffer: 0.1 # buffer to identify relevant DeltaDTM tiles overlapping with the delta polygons + this buffer
  DeltaDTM_tile_extent: 1 # 1 degree tiles in DeltaDTM by Seeger & Minderhoud

DomainSchema:
  geometry_lbl: 'geometry'  # default column name assumed for any polygon or water shed basin to contain the coordinates
  delta_id_lbl: 'BasinID2'  # asserted column name to distinguish between different Geometries for different deltas. Original from Edmonds et al. (2020)
  area_lbl: 'area'  #

Rivers:
  glofas_min_discharge: 100  # m3/s: to identify which cells to consider. TODO: proper analysis and determine Q2
  glofas_discharge_parameter: 'dis24' # TODO needs to be modified when Q2 value is added.
  glofas_lon_name: 'longitude'  # name in Glofas dataframe for longitudinal coordinates
  glofas_lat_name: 'latitude'  # name in Glofas dataframe for lattitudinal coordinates


LandUse:
  code_builtup: 50

