merit_hydro:
  data_type: RasterDataset
  driver:
    name: rasterio
    options:
      chunks:
        x: 6000
        y: 6000
  metadata:
    crs: 4326
    category: topography
    paper_doi: 10.1029/2019WR024873
    paper_ref: Yamazaki et al. (2019)
    source_license: CC-BY-NC 4.0 or ODbL 1.0
    source_url: http://hydro.iis.u-tokyo.ac.jp/~yamadai/MERIT_Hydro
    source_version: 1.0
  uri: P:/wflow_global/hydromt/topography/merit_hydro/*.vrt
  data_adapter:
    rename:
      bas: basins
      dir: flwdir
      elv: elevtn
      slp: lndslp
      sto: strord
      upa: uparea
      upg: upgrid
      wth: rivwth


gtsm_codec_reanalysis_waterlevel_hourly: # works
  data_adapter:
    rename:
      station_x_coordinate: lon
      station_y_coordinate: lat
      stations: index
  data_type: GeoDataset
  driver:
    name: geodataset_xarray
    options:
      chunks: {stations: 100, time: 1500}
      combine: by_coords
      decode_times: true
      parallel: true
  metadata:
    category: ocean
    crs: 4326
    paper_doi: 10.3389/fmars.2020.00263
    paper_ref: Muis et al. (2020)
    source_license: https://cds.climate.copernicus.eu/api/v2/terms/static/licence-to-use-copernicus-products.pdf
    source_url: https://doi.org/10.24381/cds.8c59054f
    source_version: v1
  uri: reanalysis_waterlevel_hourly_2018_12.nc


