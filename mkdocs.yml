site_name: GCFM - Global Coastal Flood Modelling
site_description: Documentation for the Global Coastal Flood Modelling input processing pipeline.
site_author: Schlu005

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: teal

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source

nav:
  - Home: index.md

  - Scripts:
    - Download Data: scripts/download_data.md
    - Merge HydroBasins: scripts/data_merge_HydroBasins.md
    - Modify Delta Masks: scripts/input_modify_delta_masks.md
    - Preprocess 01 - Model Domain: scripts/preprocess_01_model_domain.md
    - Preprocess 02 - River Sources: scripts/preprocess_02_river_source_points.md

  - Source - Input Processing:
    - Config:
      - Loader: src/input_processing/config/loader.md
    - Utils:
      - Schema & Typing: src/input_processing/utils/util_unify_typing_and_schema.md
      - Loading Files: src/input_processing/utils/loading_files.md
      - Plotting: src/input_processing/utils/plotting.md
      - Preprocess 01 - Model Domains: src/input_processing/utils/preprocess_01_ut_model_domains.md
      - Preprocess 02 - River Points: src/input_processing/utils/preprocess_02_ut_extract_river_points.md
      - Download DeltaDTM: src/input_processing/utils/download_DeltaDTM_data.md
      - Validation:
        - Modify Delta Masks: src/input_processing/utils/validation/modify_delta_masks.md
    - Workflows:
      - Preprocess 01 - Model Domain: src/input_processing/workflows/preprocess_01_wf_model_domain.md
      - Preprocess 02 - River Sources: src/input_processing/workflows/preprocess_02_wf_extract_river_points.md
      - Run Validation: src/input_processing/workflows/run_validation.md
    - Validation:
      - Test GLOFAS: src/input_processing/validation/river_input/test_GLOFAS.md
      - Test Delta Masks: src/input_processing/validation/river_input/test_delta_masks_modification.md
    - Debugging:
      - Debug River Source Extraction: src/input_processing/debugging/debug_river_source_extraction.md
