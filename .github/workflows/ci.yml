name: CI

# What this can and can't check:
# `snakemake -n` needs every data_catalogue.yml-referenced raw file to exist
# on disk to build the DAG (raw_data/ is multi-GB and lives outside the repo
# -- see config/data_catalogue.yml's `root:`), so that's not available to a
# CI runner and this workflow does NOT attempt a dry-run. What it *does*
# check, without needing any data:
#   - formatting / lint / docstrings, via the same pre-commit hooks used
#     locally (ruff-format, ruff-check, pyright, pydocstyle)
# The sync-environment-yml local hook is SKIPPED here: it shells out to
# `conda env export -n hmt_sfincs_dev`, which only makes sense on a dev's own
# machine where that named env actually exists -- this runner has no conda
# at all, so the hook can never succeed here (see tools/sync_environment.py).
#
# There is NO code-health/import-check job here anymore -- it required
# building the real pipeline environment from environment.yml on this
# ubuntu-latest runner, but environment.yml is a full `conda env export`
# from a Windows dev machine (exact win-64 build hashes plus Windows-only
# packages like pywin32/vc/vs2015_runtime), so it cannot solve on Linux at
# all. Run `python tests/check_code_health.py` locally (see CONTRIBUTING.md)
# until environment.yml's cross-platform portability is revisited.
# Before merging, also actually dry-run `snakemake -n preprocess`/`build`
# locally against real data -- see CONTRIBUTING.md's PR checklist.
#
# Deliberately triggers on pull_request only, not push: triggering on both
# for the same branch makes each job name show up twice (once per event
# type) in the branch-protection "required status checks" picker, since
# GitHub tracks pull_request-triggered and push-triggered runs of the same
# job as distinct check contexts even though the name is identical.

on:
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      SKIP: sync-environment-yml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1
